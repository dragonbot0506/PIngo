<!DOCTYPE html>
<html>
<head>
  <title>Bingo Blitz</title>

  <style>
    body {
      font-family: Arial;
      padding: 30px;
    }

    input {
      padding: 8px;
      margin-bottom: 10px;
      display: block;
    }

    #phone-input input {
      width: 60px;
      font-size: 18px;
      text-align: center;
      display: inline-block;
      margin-right: 5px;
    }
  </style>
</head>
<body>

<h2>Create Room</h2>

<input id="name" placeholder="Name">
<input id="password" placeholder="Password">

<p>Phone Number</p>
<div id="phone-input">
  <input maxlength="3" id="area" placeholder="XXX">
  <input maxlength="3" id="prefix" placeholder="XXX">
  <input maxlength="4" id="line" placeholder="XXXX">
</div>

<br>
<button onclick="handleCreateRoom()">Create Room</button>

<p id="result"></p>

<script>
const API_URL = "https://bingo-blitz-production.up.railway.app";

// auto advance
["area","prefix","line"].forEach((id, i, arr) => {
    const el = document.getElementById(id);
    el.addEventListener("input", () => {
        el.value = el.value.replace(/\D/g, "");
        if (el.value.length === el.maxLength && arr[i+1]) {
            document.getElementById(arr[i+1]).focus();
        }
    });
});

function getPhoneSlots() {
    return {
        area: document.getElementById("area").value,
        prefix: document.getElementById("prefix").value,
        line: document.getElementById("line").value
    };
}

// ALWAYS VALID (25 prompts)
function generatePrompts() {
    const arr = [];
    for (let i = 1; i <= 25; i++) {
        arr.push("Prompt " + i);
    }
    return arr;
}

async function handleCreateRoom() {
    const result = document.getElementById("result");

    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;
    const phoneSlots = getPhoneSlots();

    console.log("SENDING:", { name, password, phoneSlots });

    try {
        const res = await fetch(`${API_URL}/api/rooms`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                password,
                gridSize: 5,
                prompts: generatePrompts(),
                arbiterId: "host",
                arbiterName: name,
                arbiterPhoneSlots: phoneSlots
            })
        });

        const data = await res.json();

        console.log("RESPONSE:", data);

        if (!res.ok) {
            result.innerText = data.error;
            return;
        }

        result.innerText = "Room Code: " + data.roomCode;

    } catch (err) {
        console.error(err);
        result.innerText = "Server error";
    }
}
</script>

</body>
</html>
